<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagens dinamicas</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width:750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagens flexivel">
    </picture>

    <h2>Vamos agora testar audios</h2>
    <audio src="midia/edsongomes.mp3" controls autoplay loop>
        <source src="midia/edsongomes.mp3" type="mpeg">
        <source src="midia/edsongomes.ogg" type="ogg">
        <source src="midia/edsongomes.wav" type="wav">
    </audio>
    
    
</body>
</html>
