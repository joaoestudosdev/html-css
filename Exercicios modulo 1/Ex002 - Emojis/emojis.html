<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paragrafos</title>
</head>
<body>
    <h1>Paragrafos e quebrea de linha</h1> <!--Titulo do texto-->
    <hr> <!--Linha na horizontal-->
    <p> <!--Parágrafo-->
        Pode ta escrevendo <br> <!-- <br> = Quebra de linha-->
        tudo de qualquer <br>
        jeito, basta apenas <br>
        colocar tudo no meio do p e /p
    </p>
    <p>Se precisar usar uma quebra de linha <br>
        O comando certo é &lt;br&gt;
    </p>

    <p>
        Vamos adicionar emoji: 🚀 <br>
        &#x1F680; <br> <!--&#x + o codígo do emoji escolhido. encontrado no "emojipedia"-->
        &#x1F9A6; <br>
        👨‍💻

    </p>
</body>
</html>
