<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        } 
        
        /*EXEMPLO DE CAIXA BOX-LEVEL*/
        h1 {
            background-color: lightgrey;
            height: 300px;
            width: 300px;
            border: 10px;
            border-color: rgb(61, 61, 61);
            border-style: solid;
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
        
        /*EXEMPLO DE CAIXA INLINE-LEVEL*/
        a {
            text-decoration: none;
            color: black;
            border: 4px;
            border-style: dashed;
            border-color: rgb(133, 133, 133);
            padding-top: 2px;
            padding-right: 4px;
            padding-bottom: 2px;
            padding-left: 4px;
        }
    </style>

</head>
<body>
    <h1>Exemplos de caixa box-level</h1>
    <p>Paragrafos também são Exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. vamos ver como isso tudo funciona</p>
</body>
</html>
