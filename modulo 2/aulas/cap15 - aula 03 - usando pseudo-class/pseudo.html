<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            background-color: rgb(179, 179, 179);
            text-align: center; /* ficar no meio*/
            height: 200px; /*ALTURA*/
            width: 200px; /*LARGURA*/
            border: 1px solid black; /*largura, tipo e cor*/
            display: inline-block; /*ficar um do lado do outro*/
        }
        div:hover {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
</body>
</html>
