<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando o hover</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }
    div > p {
        display: none; /*None = ficar invisivel*/
    }
    div:hover {
        color: red;
    }

    div:hover > p { /* O sinal ">" siginifica que a tag depois está dentro da que vem antes*/
        display: block; /* block = ficar visivel*/
        color: white;
        background-color: red;
        width: 164px;
    }

    
</style>
<body>
      <h1>Exemplo de hover</h1>
      <p>Passe o mouse sobre a frase abaixo</p>
      
      <div>passe o mouse aqui
        <p>TEXTO ESCONDIDO!!</p>
      </div>

      <p>Fim do site.</p>
</body>
</html>
